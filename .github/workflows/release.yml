---
name: Release bmw-nftables

on:
  push:
    tags:
      - 'v*'
env:
  PKG_NAME: bmw-nftables
  REPOSITORY_NAME: bmw-nftables

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          pkgver=$(make pkgver)
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"

      - name: Build source archive
        run: make release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.PKG_NAME }} v${{ steps.version.outputs.pkgver }}
          tag_name: ${{ github.ref_name }}
          draft: true
          files: ${{ env.PKG_NAME }}-${{ steps.version.outputs.pkgver }}-sources.tar.gz

  update-pkgbuild:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: release
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute sha256sum
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --pattern "${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}-sources.tar.gz" \
            --dir /tmp
          sha256sum="/tmp/${{ env.PKG_NAME }}-${{ steps.version.outputs.version }}-sources.tar.gz"
          echo "sha256=$(sha256sum "$sha256sum" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
        id: checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PKGBUILD
        working-directory: src/${{ env.PKG_NAME }}-aur
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=(\"${{ steps.checksum.outputs.sha256 }}\" \"SKIP\")/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/${{ env.PKG_NAME }}-v${{ steps.version.outputs.version }}
          title: "chore: bump bmw-nftables to v${{ steps.version.outputs.version }}"
          body: |
            Auto-generated by the ${{ env.PKG_NAME }} release workflow.

            Updates `pkgver` and `sha256sums` in the PKGBUILD to match
            release [${{ env.PKG_NAME }}/v${{ steps.version.outputs.version }}](https://github.com/borismw/${{ env.REPOSITORY_NAME }}/releases/tag/v${{ steps.version.outputs.version }}).
          commit-message: "chore: bump ${{ env.PKG_NAME }} to v${{ steps.version.outputs.version }}"
          add-paths: src/${{ env.PKG_NAME }}-aur/PKGBUILD
